<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎄 Lista de Café da Manhã 🎄</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, #b30000, #006400);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      padding: 15px;
    }

    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 20px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 15px;
      font-size: 1.4rem;
      line-height: 1.3;
    }

    h1 span {
      font-size: 1.1rem;
      font-weight: 300;
    }

    .form {
      display: grid;
      gap: 12px;
      margin-bottom: 20px;
    }

    select,
    input,
    button {
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      width: 100%;
    }

    input::placeholder {
      color: #555;
    }

    button {
      background: #ffcc00;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:active {
      transform: scale(0.97);
    }

    .lista {
      background: rgba(0,0,0,0.2);
      border-radius: 15px;
      padding: 15px;
      max-height: 40vh;
      overflow-y: auto;
    }

    .dia {
      margin-bottom: 12px;
    }

    .dia h3 {
      margin: 8px 0;
      color: #ffeb3b;
      font-size: 1rem;
    }

    .item {
      font-size: 0.9rem;
      margin-left: 10px;
      line-height: 1.4;
    }

    #status {
  min-height: 20px;
  font-weight: 500;
}

.status-loading {
  color: #ffeb3b;
}

.status-success {
  color: #b2ff59;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
    footer {
      text-align: center;
      font-size: 0.75rem;
      margin-top: 15px;
      opacity: 0.85;
    }

    /* Ajustes extras para telas muito pequenas */
    @media (max-width: 360px) {
      h1 {
        font-size: 1.2rem;
      }

      select,
      input,
      button {
        font-size: 15px;
        padding: 12px;
      }
    }
  </style>
</head>

<body>

<div class="card">
  <h1>🎄 Café da Manhã 🎄<br><span>Compartilhado</span></h1>

  <div class="form">
    <input id="nome" placeholder="Seu nome" />

    <select id="dia">
      <option value="Segunda">Segunda-feira</option>
      <option value="Terça">Terça-feira</option>
      <option value="Quarta">Quarta-feira</option>
      <option value="Quinta">Quinta-feira</option>
      <option value="Sexta">Sexta-feira</option>
    </select>

    <input id="item" placeholder="O que você vai levar?" />
    <button onclick="adicionar()">Adicionar 🎁</button>
    <div id="status" style="text-align:center; font-size:0.9rem; margin-top:5px;"></div>
  </div>

  <div class="lista" id="lista"></div>

  <footer>Espírito natalino + café quentinho ☕</footer>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbykpQxiU1K0ixS26whbkE829BksVLfQSNmuAF0HO4qdOnnrdSJQ0uO4l_awFhHMPvLVwQ/exec';

  let enviando = false;

  async function adicionar() {
    if (enviando) return; // bloqueia múltiplos cliques

    const nome = document.getElementById('nome').value.trim();
    const dia = document.getElementById('dia').value;
    const item = document.getElementById('item').value.trim();

    const status = document.getElementById('status');
    const botao = document.getElementById('btnAdicionar');

    if (!nome || !item) {
      alert('Preencha nome e item 😊');
      return;
    }

    enviando = true;
    botao.disabled = true;
    status.className = 'status-loading';
    status.innerText = '⏳ Adicionando...';

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ nome, dia, item })
      });

      status.className = 'status-success';
      status.innerText = '✅ Adicionado com sucesso!';

      document.getElementById('item').value = '';

      await carregar();

      // limpa a mensagem depois de 2s
      setTimeout(() => {
        status.innerText = '';
      }, 2000);

    } catch (e) {
      status.className = '';
      status.innerText = '❌ Erro ao adicionar. Tente novamente.';
    } finally {
      enviando = false;
      botao.disabled = false;
    }
  }

  carregar();
</script>

</body>
</html>
